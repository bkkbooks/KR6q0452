body:
  text: 嗣法孫性養性亮同編上堂崇禎辛巳十月望日師住夔州府石砫牛南山華嚴寺結制上堂拈香祝聖畢復拈云此瓣香供養過去吹萬本師用酬法乳維那白槌師豎拂子云看又看不見尋又尋不著往返無蹤迹空向我摸索擲下云冷處著把火僧問這個東西不勞拈示請和尚另道一句師云鐵樹挂燈籠上堂句句有眼名為禪鼻唇直挂萬人看金針繡出鴛鴦帳大地山河共一天上堂拈拄杖一卓云會得這尊古佛即了了也若會不得也沒奈你何説戒上堂撫掌云這是正戒仔細思量無崩無壞無損無傷誰分皂白非青非黃應無所住不壞金剛金剛本體大露堂堂喝一喝上堂高處高須彌頂上放白毫低處低大海之中採摩尼不高不低又作麼生山僧今日平平解制師住萬縣寶峰山雲來寺上堂僧問爐鞴弘開未審雲來有甚消息師云半夜巖頭孤月靜進云和尚如何出手師云一聲高樹老猿啼進云學人分中得個甚麼師云毫毛出大樹問第一義即不問開堂事作麼生師云緊水灘頭拋繡毬進云恁麼則學人有賴師云有緣遇著無緣錯過若論有緣對面不睹若論無緣千里不遙莫道有緣無緣但辦己事勿論他非參得悟得在在安身立命莫説是閻家老子縱千百億釋迦也沒奈你何若未悟未了百草頭邊橫不得豎不得大爐鞴中又如何下得手卓一卓上堂十個指頭是五雙綿州附子漢州薑會得海底撈明月露地白牛角生光上堂八萬四千門戶用他作麼出門撞著露柱老僧不入海水穿著眼睛步步腳踏是路上堂老僧有時説世間法有時説出世法出世法就是世間法世間法卻是出世法何以故世出世間不二法一聲通和無覓處阿誰不是丈夫兒衲僧鼻孔如來路問升座説法即不問未出方丈事如何師云東林桃花紅灼灼進云出後如何師云西溪流水響鼕鼕進云不出不入時如何師喝一喝上堂決烈漢一腳踏翻受用無盡何故是無生滅法是無修證位是絶對待意卷舒不勞功勳來去了無變易還會麼良久云老僧巴掌也解通風師住萬縣大佛寺上堂問縣主設供為薦程太夫人和尚如何指示師云何處不西方進云如何是利生接物句師云都利山上都哆唎進云如何是離言離説句師便喝僧亦喝師云多事問如何是大佛頂師豎拂子云看進云還有向上事麼師下座上堂喝一喝云諦當諦當本無遮障動中之靜隨緣放曠良久云且道老僧住在甚麼處上堂日月照臨不到天地覆載不著含元殿上問長安直捷便是逍遙路南山高北山低日出東來又轉西昨夜霜風露消息吹落林花三五枝佛誕上堂孟夏有八不許問話有人若問善惡齊打不是巴掌英雄只為熊山路滑上堂豎拂子云原無參本無念萬里寒空打一片問道卻是古家鄉知此從來無間斷問空屋無人時如何師云金殿臥清風上堂舉經偈云無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義老僧則不然三掌打來微妙法當下了然難思議離卻見聞本受持此是吾宗真實義小參小參僧問總是鏡空堂上客誰為寂照境中人師云夢中又説夢身外更有身問如何是生前消息師喝一喝如何是生後消息師云銀碗盛雪僧舉坐具云是前是後師云一個約著不去一個拽著不回僧云因甚大地人沒奈他何師云難道老僧又奈他何乃云有相卻無相無相果是真一點靈光照內外放光明小參山裡小參山裡説山中巴掌元是我三掌打破天外天地分九州無處躲昨日五臺山有片放光石被我攜來放在汝諸人眼裡就在眼門放光放在汝諸人耳裡就在耳門放光放在汝諸人鼻裡就在鼻孔放光放在汝諸人口裡就在舌上放光處處和盤托出大衆若於此返照回光不須久立小參若人靜坐一須臾勝造河沙七寶塔寶塔終久化為塵一念不生成正覺且道遍地是覺那裡是正良久云動容揚古路不墮悄然機小參舉古人云墻上一窠草風吹兩邊倒水也沒些些一般長得好老僧不然墻上一窠草大風盡刮倒看草歸何處無草道正好若有長草處癡人生死何時了小參良久云西來大意總不出這個道理道本無知但知個有即為妄想但説個無就落無記不拘有無一切放下晝參夜參參到水窮山盡處自有一個轉身時有等背地裡看幾句糟粕記一肚抄一部見人做工夫便打失笑問你笑個甚麼落在甚處卻又無言可答奈何奈何茶話茶話師云未曾喫茶話已説了還説個甚麼僧舉果云這個聻師云椿杼不辨葫瓠同溝僧云再請開示師云小雖一般大則各別僧禮拜師云謝茶除夕茶話去年有個三十日今年有個三十日明年有個三十日且道喚作甚麼老僧喚作過去現在未來若有個阿師出來云過去未來即不問請和尚道個現在底老僧即與三掌云這一掌是佛陀這一掌是達磨這一掌是僧伽那阿師無對佛陀達磨僧伽明朝元旦各下一語來你看佛也空空無説祖也默默無別僧也忘言兩眼紅似血衲僧又作麼生老僧生得粗魯那管初一十五問來舉起巴掌打底是佛是祖茶話監院請云今日清明佳節禪衆設茶供養伏請和尚垂慈資薦開山實相師云實相比丘建大佛剎欲開選佛之場不覺涅槃已至幸得兒孫輩延老僧垂手雲集方來即今如何薦拔良久云設利塔中誐誐喃阿耨池邊哆哆唎示衆示衆若會世間法必要理事雙融若參出世法須人法兩忘全不關理事領個話頭朝朝暮暮主靜離人久久工夫純熟忽然打破疑團頭頭顯露物物明真不用躊躇直捷便道透脫羅籠不存間解示衆日用事無別一隻草鞋爛前後兩半節費了多少線如何是爛底道理雙頭驢兒三隻角一寸龜毛重七斤示衆一根枯樹靠閻浮二人只穿一隻鞋一齊穿一齊脫且道是何人語機緣一居士參念佛是誰師云會得誰字麼士喝師便打士復喝師又打平山和尚後問云你將甚麼打師云扇子山云你巴掌短在師喚維那那應諾師云咱底巴掌卻長一居士請開示師云凡參話頭必須放下世情內不妄想外不攀援事事打貼潔淨看畢竟如何是萬法喚甚麼作一久久提持不待人説自有惺發時士云和尚多少壽師云前三三後三三士擬議師云莫錯會好平山和尚問坐脫立亡工夫如何做師云默然全無別逍遙路可登山云默然消息錯會者多師云有錯底不錯底山云如何是錯師云黑山藏鬼窟如何是不錯師云烏龜炭裡走一僧解師衣云肚裡幾個獅子師云當頭是一左三右四僧云今在不在師打云這甚東西説在不在黑白兩人各坐一傍僧云一個黑一個白師云誰教你分黑白僧云黑底是白底是師云俱不是僧云如何是師掌云會麼福清縣令問某坐到無人無我處稍覺復動是玄耶禪耶師云不是玄亦不是禪令云是甚麼師以扇敲桌又問曾會臨濟麼師云山僧不識字令云我曾得會來師云下一語看令云這是想不來底師云何曾得會師問維那幾炷香了那云六炷已完師云我這裡有一炷香常法如是那云請和尚香看師云你要見我這炷香除非雙眼落地一文學見貓銜鼠戲請師説法師云參禪如似貓捕鼠眼似銅鈴尾飛舞善哉善哉菩薩面宗門也現夜叉虎楊貢元云弟子諸事俱空特來參和尚師云還回家麼元云回師云何空之有師同焦都司茶次司云請和尚與我趙州茶師云非等間喫得底司云當下領過師云甚麼味司無語師呵呵大笑洞勤舊同師食粥師云你二時粥飯作麼生了舊撫掌師云錯舊問和尚二時粥飯作麼生了師舉足舊云是同是別師云錯師赴熊月崖居士請登舟士云看腳下師云盡摘洛陽花士遜揖師云北禮士云我過那邊去師云中間聻士云和尚自何來師云還見麼士拍掌師云此是老僧餿氣士問如何是即今為人大意師掌云普付普付老僧巴掌打著個工部破山禪師過吉祥菴師出方丈值山飲酒次山云你敢來不師云海寶千般各取如意山云喚甚麼作寶師與一掌山云再打兩掌看師云有掌不打癡肉山豎指云這一指與你巴掌是同是別師云一樹梨花靠粉墻平山和尚指一僧云這僧可作書記師豎扇問僧云是甚麼字僧遲疑師云字也不識如何作得書記僧問和尚巴掌打在甚處師云須彌山僧云太遠生師云近而不遠僧擬議師云鷂子過新羅僧禮拜師便打僧來參師云俗地在那裡僧云明州師云離家幾載僧云五載師云探親不曾僧云和尚是老婆禪師云你這兒子是我生底僧無語師問僧即物契神四字重那一字僧云重神字師云錯僧問和尚又重那一字師云重即字僧云意旨如何師云即體之用兮把住放行全是我即用之體兮拈來拋去更由誰答問僧問念佛底是誰師云念佛底畢竟是誰僧云念底是不念底是師云念則錦上添花不念雪裡送炭古孝廉問和尚巴掌既長因甚打不著峭然師云豈但峭然古云長底如何師云打到平都古云短底如何師云打盡天下古云究竟聻師拍三下僧問無明煩惱作麼生斷師云無明也不斷煩惱也不忘若斷無明了生死瞎漢虛空摸太陽僧問如何是體師云坐下如何是用師云起去體用雙彰時如何師云老僧無丈人僧問如何是話頭師云腳上生腳如何是話尾師云如牛無角如何是話腰師云你且行路如何是頭尾俱正師便打答月崖居士請士大夫留心法門有決定志想是夙植德本大事因緣必得成就此事在本分胸襟流出莫從他覓覓之不得得之不真若信得及打開自己寶藏庫見徹本來面目內心外境廓爾銷融彼聖此凡平等超越何故聻孟冬不熱老僧與公應個時節佛法若作商量分明弄巧成拙若作無事話會又與外道何別直饒總不如斯敢保尊官未徹如來言祖師訣無孔鐵錘重下楔自家心地亂如麻莫把指頭當作月休思量謾解説千年枯骨咬著舌任他兔走與烏飛飢來喫飯困來歇答江居士老僧巴掌了三玄用處臨機沒大千有無不坐誰人見凡聖不通那敢攀不是心兮不是佛不是物兮不是禪且道是個甚麼參答田參軍巴掌無別凝然清淨默默無言平常心印妙解全開諸佛慧命門風露布要在當人不盡無為不入有為不假修持別無對待僧問和尚巴掌在麼師便打僧云別道一句看師云老僧今日腰疼偈頌三巴掌妙中妙天上人間同參到吾今頓斷挂心鉤打破愁城嗄嗄笑三巴掌孰與同劄錐無地晝夜窮誰知今劫窮心漏轟雷掣電一條龍三巴掌不用能頓斷金鎖走蛟鱗識得這個呵呵笑而今不是世上人三巴掌不昧前離塵脫俗三十三當初只道峨山去今朝依舊在四川眼前一物即不是但有絲毫都是塵本是明空應無住寂寂非非是妙心森羅萬象萬象一相一相諸相諸相非相非相同相同非是相學人要得真悟修莫只尋覓數行頭若得一心無罣礙絶世忘情一旦休無為妙法果是真一掃萬卷悟無生一法包含無量法一門劈破萬般門趙州狗子盞中茶雲門糊餅共一家有人問我甚何宗屎橛拜上三斤麻參禪喚作無縫鎖昏沉妄想最難躲明得非心非非心本自無我無我所一法法萬法萬法法一法法法本無法無法真是法心靜越諸天體正自然安身動必有二不動自周圓非有極相生非無永無蹤非非無不見無見又相生一拳打破太虛空腳踏閻浮世界碎其中有妙三巴掌參來原是西來意明了即到古家鄉一步跳出三界去輥開雲門天外天劫劫不受閻羅氣頌聚雲老人升座獅子出丈世尊榜樣拖開白蓮無邊光放右肩褊袒合掌拜上一聲銅響請歸方丈吹萬大師命讚和尚似驢三界那能皮長耳頂著天四蹄踏著地今劫頓斷紫韁繩腸肚心空無屎屁為吹萬大師對靈慧麗承事茲已畢和尚一朵白蓮去今在瓶中作甚麼咄切忌生前這一句李解元看師録卷卻請題三巴掌一字無離卻心意用工夫頓悟心空超劫外威音發現任卷舒一護法請題蜘蛛蜘蛛哥蜘蛛哥每日簷前張網羅那個蚊虻敢過只顧一身飽暖不管他人死活有朝風雨打著窠未免家園兒自破頌萬法歸一泥人騎木馬你我是他咱烏龜鑽象鼻蝦蟆問冬瓜一歸何處分明是個獨角牛前後不見尾和頭白雲堆裡攢蹄臥睡老乾坤不覺秋青州布衫青州布衫世間稀無領無袖少人知金針玉線穿海嶽此是那吒第一機題拐李拐李離拐路難行肩擔日月步風雲等間不語凡夫話站看人間惹利名衆指火請題凡火聖火無明火無種無根最難躲智慧火性煆得空燒卻佛魔無人我僧舉稱請題識得此物輕重難謾不須摸索多少均平是即是怕僧云怕甚麼師云怕底是錯認定盤星忠路司尊同師曬日請題一輪紅日正中懸照徹無私世界寬司尊云請巴掌題夜月師續云三掌打破梅梢月海底泥牛舞翠煙園中菊開請題三三六六九重陽金風吹綻滿園香淵明未賞醺醺醉素影寒霜放一場請題雞冠花雞冠花放開幾朵丹青無粉胭脂抹猩猩血染茜紅袍恰似南方丙丁火四季景喜東風是何春河開雪散水流水萌芽出土枝枝運露出鋒芒滿地青滿地青誰家卻作斷腸聲八十老翁眠不得陽關一曲作空亭夏日長愛清涼晨禮佛飲茶湯山鳥林裡千般韻為喚歸來到故鄉看鴛鴦細思量曉來一陳薰風起吹落池花滿岸香秋風淒金風催葉落花殘結子遲明月蘆花沙汀岸滿目青黃莫問渠歸根處在這裡好消息有誰知若能識得家中寶阿誰不是丈夫兒冬雪飛朔風吹紅爐添炭煎一杯滿山盡是銀沙落素影寒霜卻是誰卻是誰玉麟明月下腳遲不是一番寒徹骨怎得梅花香滿衣住山歌山上逢人問路嶇山童遙指山幾皮山間明月松頭挂山鳥飛來林裡棲看不見山風聲搖吟玉線山澗寒泉湧如花山前白雪飛片片山外風寒霧氣霞山中古寺空王殿山僧日飲趙州茶解脫歌若參自己本來面汀上蘆花分兩岸要知自家妙慧心青山流翠一溪雲聽不見新豐曲子無間斷尋不著這個種子好摸索且由他只在東村王老家罷罷罷晝夜免把心頭挂忽然見雪裡炭來會一面決得破明得他滄州獅子景州塔真定一尊大菩薩臨冬詠重陽九九與冬連冰霜清冷朔風寒紅爐添火柴半掩有興尋梅帶雪還帶雪還冷凄凄長至日來一線輝大地白雲都蓋盡但聞山外野猿啼詠水牯牛説起這牯牛不見尾和頭遍界無藏處何處覓蹤由休縱逸漫優遊一鼾眠露地水草調得周若人識得此中意現現成成不用修三巴掌和尚行狀悟眉居士談正乾稽首拜撰三巴掌和尚北直趙州柏鄉縣李氏子其人修長蠶眉河目廣額豐頤鬚如螺結先為琉璃廠藝中歲從天台無盡禪師披剃崇禎六年詣峨眉飯衆遇寇徒衆被害師僅以身免過忠州司馬少遊馬公送至吹萬大師處大師一見即云我家人來了命當行堂灑掃執事師嘗習修養等事三伏天裸身曬日言不生蟲時鐵壁隱師問云何不走上正路師云咱北方人一字不識爺是文字與咱工夫不同隱師指問吹大師大師示萬法歸一話頭苦參數載始有入處一日大師上堂師問如何是佛大師云拄杖撑著月如何是祖大師云橫肩兩樣看如何是超佛越祖大師云提起三十棒師喝一喝大師拍掌三下隱師問云會麼師云不會隱師勉以苦參師參至二十五期七炷香不下禪塌忽然悟徹大笑不止隱師徵云你見個甚麼師云我名三巴掌和尚隱師云是我教你參的將甚麼謝師拍手三下隱師令見吹大師師詣方丈禮拜起拍三掌大師云不許拍掌師頓足三下大師云不許頓足師叩齒三下大師云一切都不許師正身立大師復令呈偈師遽答云參得三巴掌真是法中王不昧家中寶人香萬里香大師可之大師臨終書偈云九百星辰一齊下老僧如象亦如馬正看鐵眉恁麼來江頭灩澦實瀟灑與更號鐵眉有三巴掌乃老僧萬里外弟子之囑師出世後開堂四次甲申秋同工部月崖熊公入施衛一座主夢神人報曰淨掃殿堂迎趙州祖次日師至與夢中見像相符傳以為異世亂轉錫南濱鳳衛侯牟公閲師録嘆曰當時錯過此老乃專官請師既至師示微疾以衣鉢付門人耳菴遂圓寂建塔都會之觀音山熊耳菴住世六十五載語録一卷盛行於世巴掌歌巴掌和尚大奇特以巴掌説微妙法云何是三卻非三是三非三誰饒乏我聞輪指照十方合三巴掌十五指一一指端放光明月映千江正如是黑氏拈花左右擎此一巴掌從何生用一舍一卻成三識得朝霞是早晴握手作雲伸手掌笑向虛空弄聲響千手斷臂豈偶然但道一字即魍兩趙州土田久磽確道是棒喝是音樂蒲團冰冷人未歸門外空煩鳥剝啄吹老人手如鐵入木三分肘光掣尋取案上巴掌痕枉卻子規口中血水乳相逢漫饒舌看誰踏破雪上雪時崇禎甲申秋前五日文淵閣大學士有庵文安之頓首拜撰
